<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periyanayagan Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.7);
    position: sticky;
    top: 0;
}

nav h1 {
    color: #38bdf8;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(45deg, #2563eb, #06b6d4);
}

.hero h2 {
    font-size: 2.5rem;
}

/* SECTIONS */
section {
    padding: 40px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    max-width: 600px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* SKILLS BAR */
.bar {
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0;
}

.fill {
    height: 10px;
    background: #38bdf8;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 20px;
    margin-top: 15px;
    background: #38bdf8;
    color: black;
    border-radius: 20px;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
    <h1>Periya</h1>
    <div>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero" id="home">
    <h2 id="typing"></h2>
    <p>AI & Data Science Student 🚀</p>
</div>

<!-- ABOUT -->
<section id="about">
    <div class="card">
        <h2>About Me</h2>
        <p>I am passionate about AI, ML and Web Development.</p>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="card">
        <h2>Skills</h2>

        <p>Python</p>
        <div class="bar"><div class="fill" style="width:80%"></div></div>

        <p>Machine Learning</p>
        <div class="bar"><div class="fill" style="width:70%"></div></div>

        <p>Web Development</p>
        <div class="bar"><div class="fill" style="width:75%"></div></div>

    </div>
</section>

<!-- PROJECTS -->
<section id="projects">
    <div class="card">
        <h2>Projects</h2>
        <p>AI Chatbot | Portfolio Website | Student System</p>
    </div>
</section>

<!-- CONTACT -->
<section>
    <div class="card">
        <h2>Contact</h2>
        <a href="mailto:selvakumarperiyanayagan@gmail.com" class="btn">Email Me</a>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 PERIYANAYAGAN S</p>
</footer>

<script>
let text = "Hello, I'm PERIYANAYAGAN S 👋";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 80);
    }
}

typing();
</script>

</body>
</html>
