<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Periyanayagan Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    scroll-behavior: smooth;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.7);
    position: sticky;
    top: 0;
}

nav h1 {
    color: #38bdf8;
}

nav a {
    color: white;
    margin-left: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
    background: linear-gradient(45deg, #ff512f, #dd2476);
}

.hero img {
    width: 120px;
    border-radius: 50%;
    margin-top: 15px;
    border: 3px solid white;
}

.hero h2 {
    font-size: 2.2rem;
    margin-top: 10px;
}

/* SECTION */
section {
    padding: 40px 20px;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.05);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    max-width: 600px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* SKILLS */
.bar {
    background: #334155;
    border-radius: 10px;
    overflow: hidden;
    margin: 10px 0;
}

.fill {
    height: 10px;
    background: #38bdf8;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 10px 20px;
    margin: 10px;
    background: #38bdf8;
    color: black;
    border-radius: 20px;
    text-decoration: none;
}

/* SOCIAL */
.social a {
    margin: 0 10px;
    color: #38bdf8;
    text-decoration: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: black;
}
</style>

</head>
